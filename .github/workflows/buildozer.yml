name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up System JDK and Build Utilities
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer & Cython Compiler
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.36

    - name: Package Android APK using Buildozer
      run: |
        buildozer android debug
      env:
        BUILDOZER_ACCEPT_SDK_LICENSE: "1"

    - name: Upload Output APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: chatbot-android-apk
        path: bin/*.apk
